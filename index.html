/* build calendar grid for a given year/month: returns array of weeks, each an array of {day,dateKey}|null */
function buildMonthGrid(year,month){
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++){
    const dateKey=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    cells.push({day:d,dateKey});
  }
  while(cells.length%7!==0)cells.push(null);
  const weeks=[];
  for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  return weeks;
}

function detectCountry(phone){
  let digits=(phone||"").replace(/[^\d+]/g,"");
  digits=digits.replace(/^00/,"+");
  if(!digits.startsWith("+")){
    if(digits.startsWith("0"))return"Egypt";
    digits="+"+digits;
  }
  const noPlus=digits.slice(1);
  for(const[code,name] of COUNTRY_CODES){
    if(noPlus.startsWith(code))return name;
  }
  return"";
}

  chevron:({s=16,c,style})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={style}><polyline points="6 9 12 15 18 9"/></svg>,
  arrowRight:({s=14,c})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  check:({s=14,c})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  megaphone:({s=17,c})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 11l18-7v16L3 13v-2z"/><path d="M7 13v5a2 2 0 002 2h1v-6"/></svg>,
  image:({s=16,c})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>,
};

const FRAUNCES={fontFamily:"'Fraunces',serif"};

/* ══════════════════════ MAIN APP ══════════════════════ */
function App(){
  const[lang,setLang]=useState(()=>ls("cmp_lang","en"));
  const[theme,setTheme]=useState(()=>ls("cmp_theme","light"));
  const[clients,setClients]=useState(()=>ls("cmp_clients",[]));
  const[secondCall,setSecondCall]=useState(()=>ls("cmp_second",[]));
  const[callLog,setCallLog]=useState(()=>ls("cmp_calllog",{}));
  const[monthHistory,setMonthHistory]=useState(()=>ls("cmp_history",{}));
  const[tab,setTab]=useState("home");
  const[search,setSearch]=useState("");
  const[filter,setFilter]=useState("all");
  const[modal,setModal]=useState(null);
  const[modalClosing,setModalClosing]=useState(false);
  const[commentData,setCommentData]=useState({id:null,text:""});
  const[singleForm,setSingleForm]=useState({name:"",phone:"",nat:"eg",country:""});
  const[mNames,setMNamesRaw]=useState("");
  const[mPhones,setMPhonesRaw]=useState("");
  function stripBlankLines(value){
    return value.split("\n").filter(line=>line.trim()!=="").join("\n");
  }
  function setMNames(value){setMNamesRaw(stripBlankLines(value));}
  function setMPhones(value){setMPhonesRaw(stripBlankLines(value));}
  const[mErr,setMErr]=useState("");
  const[sForm,setSForm]=useState({name:"",phone:"",note:""});

  // campaign state
  const[campAudience,setCampAudience]=useState("all");
  const[campMsg,setCampMsg]=useState("");
  const[campImg,setCampImg]=useState(null);
  const[campDelay,setCampDelay]=useState(30);
  const[campDelayUnit,setCampDelayUnit]=useState("seconds");
  const[campQueue,setCampQueue]=useState(null); // {list:[], idx:0}
  const now0=new Date();
  const[calYear,setCalYear]=useState(now0.getFullYear());
  const[calMonth,setCalMonth]=useState(now0.getMonth());
  const[selectedDay,setSelectedDay]=useState(todayKey());

  const t=T[lang];
  const dark=theme==="dark";
  const rtl=lang==="ar";

  useEffect(()=>lsSet("cmp_lang",lang),[lang]);
  useEffect(()=>lsSet("cmp_theme",theme),[theme]);
  useEffect(()=>lsSet("cmp_clients",clients),[clients]);
  useEffect(()=>lsSet("cmp_second",secondCall),[secondCall]);
  useEffect(()=>lsSet("cmp_calllog",callLog),[callLog]);
  useEffect(()=>lsSet("cmp_history",monthHistory),[monthHistory]);

  useEffect(()=>{
    const cur=monthKey(),last=localStorage.getItem("cmp_lastmonth");
    if(last&&last!==cur){
      const tot=Object.values(callLog).reduce((a,b)=>a+b,0);
      setMonthHistory(h=>{const n={...h,[last]:tot};lsSet("cmp_history",n);return n});
      setCallLog({});
    }
    localStorage.setItem("cmp_lastmonth",cur);
  },[]);

  function closeModal(){
    setModalClosing(true);
    setTimeout(()=>{setModal(null);setModalClosing(false);},220);
  }

  const today=todayKey();
  const callsToday=callLog[today]||0;
  const callsYest=callLog[yesterdayKey()]||0;
  const callsWeek=Object.entries(callLog).filter(([d])=>d>=weekStartKey()).reduce((a,[,v])=>a+v,0);
  const callsMonth=Object.values(callLog).reduce((a,b)=>a+b,0);
  const monthGrid=buildMonthGrid(calYear,calMonth);
  const isCurrentCalMonth=calYear===now0.getFullYear()&&calMonth===now0.getMonth();
  function calPrev(){
    if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else{setCalMonth(m=>m-1);}
  }
  function calNext(){
    if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else{setCalMonth(m=>m+1);}
  }
  function shiftSelectedDay(delta){
    const d=new Date(selectedDay+"T00:00:00");
    d.setDate(d.getDate()+delta);
    setSelectedDay(d.toISOString().slice(0,10));
  }
  const selectedDayLabel=(()=>{
    const d=new Date(selectedDay+"T00:00:00");
    const wd=WEEKDAY_FULL[lang][d.getDay()];
    return`${wd}, ${d.getDate()} ${MONTH_NAMES[lang][d.getMonth()]}`;
  })();
  const weeksInMonth=(()=>{
    const now=new Date();
    const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const chunkSize=Math.ceil(daysInMonth/4);
    const weeks=[{idx:1,total:0},{idx:2,total:0},{idx:3,total:0},{idx:4,total:0}];
    for(let d=1;d<=daysInMonth;d++){
      const dateKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const weekIdx=Math.min(3,Math.floor((d-1)/chunkSize));
      weeks[weekIdx].total+=callLog[dateKey]||0;
    }
    return weeks;
  })();
  const egC=clients.filter(c=>c.nat==="eg").length;
  const intlC=clients.filter(c=>c.nat==="intl").length;
  const contactedC=clients.filter(c=>c.called).length;
  const notC=clients.filter(c=>!c.called).length;

  const filtered=clients.filter(c=>{
    const q=search.toLowerCase();
    const match=c.name.toLowerCase().includes(q)||c.phone.includes(q);
    if(!match)return false;
    if(filter==="eg")return c.nat==="eg";
    if(filter==="intl")return c.nat==="intl";
    if(filter==="contacted")return c.called;
    if(filter==="not")return!c.called;
    return true;
  });
  const filteredSecond=secondCall.filter(c=>{
    const q=search.toLowerCase();
    return c.name.toLowerCase().includes(q)||c.phone.includes(q);
  });

  function markCalled(id,phone){
    setClients(cs=>cs.map(c=>c.id===id?{...c,called:true}:c));
    setCallLog(l=>({...l,[today]:(l[today]||0)+1}));
    window.open(`tel:${phone}`);
  }
  function delClient(id){setClients(cs=>cs.filter(c=>c.id!==id));}
  function delAll(){if(window.confirm(t.deleteAllConfirm))setClients([]);}
  function openComment(client){setCommentData({id:client.id,text:client.note||""});setModal("comment");}
  function saveComment(){
    const{id,text}=commentData;
    setClients(cs=>cs.map(c=>c.id===id?{...c,inSecond:true,note:text}:c));
    const cl=clients.find(c=>c.id===id);
    if(cl){
      const up={...cl,inSecond:true,note:text};
      setSecondCall(s=>s.find(x=>x.id===id)?s.map(x=>x.id===id?up:x):[...s,up]);
    }
    closeModal();
  }
  function removeFromSecond(id){
    setSecondCall(s=>s.filter(c=>c.id!==id));
    setClients(cs=>cs.map(c=>c.id===id?{...c,inSecond:false}:c));
  }
  function updateClientNat(id,nat,country){
    setClients(cs=>cs.map(c=>{
      if(c.id!==id)return c;
      if(nat==="intl"){
        const auto=country!==undefined&&country!==""?country:detectCountry(c.phone);
        return{...c,nat,country:auto};
      }
      return{...c,nat,country:""};
    }));
  }
  function addSingle(){
    if(!singleForm.name.trim()||!singleForm.phone.trim())return;
    const country=singleForm.nat==="intl"?(singleForm.country||detectCountry(singleForm.phone)):"";
    setClients(cs=>[...cs,{...singleForm,country,id:uid(),called:false,inSecond:false,note:""}]);
    setSingleForm({name:"",phone:"",nat:"eg",country:""});closeModal();
  }
  function importMulti(){
    const names=mNames.split("\n").map(s=>s.trim()).filter(Boolean);
    const phones=mPhones.split("\n").map(s=>s.trim()).filter(Boolean);
    if(names.length!==phones.length){setMErr(t.mismatchErr);return;}
    setClients(cs=>[...cs,...names.map((name,i)=>{
      const phone=phones[i];
      const country=detectCountry(phone);
      const nat=country==="Egypt"||!country?"eg":"intl";
      return{id:uid(),name,phone,nat,country:nat==="intl"?country:"",called:false,inSecond:false,note:""};
    })]);
    setMNames("");setMPhones("");setMErr("");closeModal();
  }
  function addManualSecond(){
    if(!sForm.name.trim())return;
    setSecondCall(s=>[...s,{id:uid(),name:sForm.name,phone:sForm.phone,nat:"eg",called:false,inSecond:true,note:sForm.note}]);
    setSForm({name:"",phone:"",note:""});closeModal();
  }

  function campAudienceList(){
    if(campAudience==="eg")return clients.filter(c=>c.nat==="eg");
    if(campAudience==="intl")return clients.filter(c=>c.nat==="intl");
    return clients;
  }
  function startCampaign(){
    const list=campAudienceList();
    if(list.length===0)return;
    setCampQueue({list,idx:0});
  }
  function openNextChat(){
    if(!campQueue)return;
    const client=campQueue.list[campQueue.idx];
    const text=encodeURIComponent(campMsg);
    window.open(`https://wa.me/${client.phone.replace(/\D/g,"")}?text=${text}`,"_blank");
    if(campQueue.idx+1>=campQueue.list.length){
      setCampQueue(q=>({...q,idx:q.idx+1}));
    }else{
      setCampQueue(q=>({...q,idx:q.idx+1}));
    }
  }
  function handleImagePick(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>setCampImg(reader.result);
    reader.readAsDataURL(file);
  }

  /* ── palette — warm, editorial ── */
  const P={
    bg:        dark?"#15130F":"#FAF8F4",
    surface:   dark?"#1E1C17":"#FFFFFF",
    surface2:  dark?"#262420":"#F4F1EA",
    border:    dark?"rgba(255,255,255,0.08)":"rgba(20,16,10,0.09)",
    text:      dark?"#F2EFE9":"#1A1712",
    textSub:   dark?"#9B9387":"#7A7264",
    accent:    dark?"#D8B26A":"#9C6B3E",
    accentSoft:dark?"rgba(216,178,106,0.16)":"rgba(156,107,62,0.09)",
    green:     dark?"#8FBF8A":"#3F7A4A",
    greenSoft: dark?"rgba(143,191,138,0.16)":"rgba(63,122,74,0.1)",
    red:       dark?"#D98C7E":"#A8442F",
    redSoft:   dark?"rgba(217,140,126,0.16)":"rgba(168,68,47,0.08)",
    overlay:   dark?"rgba(0,0,0,0.7)":"rgba(20,16,10,0.45)",
    navBg:     dark?"rgba(21,19,15,0.94)":"rgba(250,248,244,0.94)",
  };

  const app={
    width:"100%",height:"100%",background:P.bg,display:"flex",
    flexDirection:"column",direction:rtl?"rtl":"ltr",color:P.text,
    fontFamily:"'Inter',sans-serif",position:"relative",overflow:"hidden",
  };
  const scrollArea={flex:1,overflowY:"auto",overflowX:"hidden",paddingBottom:96,WebkitOverflowScrolling:"touch"};

  const headerWrap={background:P.bg,padding:"22px 22px 14px",position:"sticky",top:0,zIndex:50};
  const brandRow={display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:(tab==="clients"||tab==="second")?16:4};
  const brandTitle={...FRAUNCES,fontSize:27,fontWeight:600,color:P.text,letterSpacing:-0.5,lineHeight:1};
  const brandSub={fontSize:10.5,color:P.textSub,marginTop:6,textTransform:"uppercase",letterSpacing:1.6,fontWeight:600};
  const gearBtn={background:"none",border:`1px solid ${P.border}`,borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.25s",flexShrink:0};
  const rule={height:1,background:P.border,marginTop:16};
  const searchWrap={display:"flex",alignItems:"center",gap:10,borderBottom:`1.5px solid ${P.text}`,padding:"4px 2px 10px"};
  const searchInput={flex:1,background:"none",border:"none",outline:"none",fontSize:14.5,color:P.text,fontFamily:"'Inter',sans-serif",letterSpacing:0.2};

  const navWrap={position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:P.navBg,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:`1px solid ${P.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom,0px)"};
  const navBtn={flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,padding:"14px 0 10px",border:"none",background:"none",cursor:"pointer",position:"relative"};

  const pad={padding:"0 22px"};

  const STATS=[
    {label:t.total,val:clients.length,onClick:()=>{setTab("clients");setFilter("all");}},
    {label:t.eg,val:egC,onClick:()=>{setTab("clients");setFilter("eg");}},
    {label:t.intl,val:intlC,onClick:()=>{setTab("clients");setFilter("intl");}},
    {label:t.contacted,val:contactedC,onClick:()=>{setTab("clients");setFilter("contacted");}},
    {label:t.notContacted,val:notC,onClick:()=>{setTab("clients");setFilter("not");}},
    {label:t.secondCall,val:secondCall.length,onClick:()=>setTab("second")},
  ];
  const FILTERS=[
    {key:"all",label:t.filterAll},{key:"eg",label:t.eg},{key:"intl",label:t.intl},
    {key:"contacted",label:t.contacted},{key:"not",label:t.notContacted},
  ];

  const modalOverlay={position:"fixed",inset:0,background:P.overlay,zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"};
  const modalSheet={background:P.surface,borderRadius:"28px 28px 0 0",padding:"10px 0 0",width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",direction:rtl?"rtl":"ltr",transform:modalClosing?"translateY(100%)":undefined,transition:modalClosing?"transform 0.22s cubic-bezier(.4,0,1,1)":undefined};
  const sheetHandle={width:32,height:3,borderRadius:2,background:P.border,margin:"0 auto 22px"};
  const sheetPad={padding:"0 24px 44px"};
  const sheetTitle={...FRAUNCES,fontSize:23,fontWeight:600,color:P.text,marginBottom:22};
  const inputStyle={width:"100%",padding:"13px 2px",background:"none",border:"none",borderBottom:`1.5px solid ${P.border}`,fontSize:14.5,color:P.text,outline:"none",fontFamily:"'Inter',sans-serif",marginBottom:18,transition:"border 0.2s"};
  const labelStyle={fontSize:10.5,fontWeight:700,color:P.textSub,marginBottom:8,textTransform:"uppercase",letterSpacing:1.4};
  const selectStyle={...inputStyle,appearance:"none",cursor:"pointer"};
  const textareaStyle={...inputStyle,minHeight:110,resize:"vertical",border:`1.5px solid ${P.border}`,borderRadius:10,padding:"12px 14px"};
  const errStyle={background:P.redSoft,color:P.red,fontSize:12.5,padding:"10px 13px",borderRadius:10,marginBottom:16,fontWeight:500};
  const hintStyle={fontSize:11.5,color:P.textSub,marginBottom:16,lineHeight:1.5};
  const btnRow={display:"flex",gap:10,marginTop:6};
  const btn=(type)=>{
    const base={flex:1,padding:"14px",border:"none",borderRadius:30,fontSize:13.5,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,transition:"all 0.2s",fontFamily:"'Inter',sans-serif",letterSpacing:0.3,textTransform:"uppercase"};
    if(type==="primary")return{...base,background:P.text,color:P.bg};
    if(type==="danger")return{...base,background:P.redSoft,color:P.red};
    return{...base,background:"none",color:P.textSub,border:`1.5px solid ${P.border}`};
  };
  const actionRow={width:"100%",padding:"16px 4px",border:"none",borderBottom:`1px solid ${P.border}`,background:"none",fontSize:14.5,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,transition:"all 0.2s",fontFamily:"'Inter',sans-serif",color:P.text};

  const pillBtn=(active)=>({padding:"10px 16px",borderRadius:30,fontSize:12.5,fontWeight:600,border:`1.4px solid ${active?P.text:P.border}`,background:active?P.text:"none",color:active?P.bg:P.textSub,cursor:"pointer",transition:"all 0.2s",fontFamily:"'Inter',sans-serif"});

  return(
    <div style={app}>
      {/* HEADER */}
      <div style={headerWrap}>
        <div style={brandRow}>
          <div>
            <div style={brandTitle}>Client Manager</div>
            <div style={brandSub}>{t.sub}</div>
          </div>
          <button style={gearBtn} onClick={()=>setModal("settings")}>
            <Icon.gear s={16} c={P.text}/>
          </button>
        </div>
        {(tab==="clients"||tab==="second")&&(
          <div style={searchWrap} className="page-in">
            <Icon.search s={14} c={P.textSub}/>
            <input style={searchInput} value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.search}/>
            {search&&<button style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex"}} onClick={()=>setSearch("")}><Icon.x s={14} c={P.textSub}/></button>}
          </div>
        )}
        {tab==="home"&&<div style={rule}/>}
      </div>

      {/* SCROLL AREA */}
      <div style={scrollArea}>

        {/* ── HOME ── */}
        {tab==="home"&&(
          <div style={pad} className="page-in" key="home">
            <div style={{marginTop:18,marginBottom:8}}>
              {STATS.map((s,i)=>(
                <button key={s.label} onClick={s.onClick} className="card-in" style={{
                  width:"100%",background:"none",border:"none",borderBottom:`1px solid ${P.border}`,
                  padding:"18px 0",display:"flex",alignItems:"center",justifyContent:"space-between",
                  cursor:"pointer",animationDelay:`${i*0.045}s`,textAlign:rtl?"right":"left",
                }}>
                  <div>
                    <div style={{fontSize:10.5,fontWeight:700,color:P.textSub,textTransform:"uppercase",letterSpacing:1.4,marginBottom:6}}>{s.label}</div>
                    <div key={s.val} className="num-in" style={{...FRAUNCES,fontSize:38,fontWeight:500,color:P.text,letterSpacing:-1}}>{s.val}</div>
                  </div>
                  <div style={{width:34,height:34,borderRadius:"50%",border:`1px solid ${P.border}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Icon.arrowRight s={13} c={P.textSub}/>
                  </div>
                </button>
              ))}
            </div>

            <div style={{margin:"30px 0 18px",fontSize:10.5,fontWeight:700,color:P.textSub,textTransform:"uppercase",letterSpacing:1.6}}>{t.actions}</div>

            <button style={actionRow} onClick={()=>setModal("addSingle")}>
              <span style={{display:"flex",alignItems:"center",gap:14}}><Icon.plus s={16} c={P.accent}/>{t.addClient}</span>
              <Icon.arrowRight s={13} c={P.textSub}/>
            </button>
            <button style={actionRow} onClick={()=>setModal("addMulti")}>
              <span style={{display:"flex",alignItems:"center",gap:14}}><Icon.layers s={15} c={P.accent}/>{t.addMultiple}</span>
              <Icon.arrowRight s={13} c={P.textSub}/>
            </button>
            <button style={actionRow} onClick={()=>setModal("campaign")}>
              <span style={{display:"flex",alignItems:"center",gap:14}}><Icon.megaphone s={15} c={P.accent}/>{t.campaign}</span>
              <Icon.arrowRight s={13} c={P.textSub}/>
            </button>
            <button style={{...actionRow,color:P.red}} onClick={delAll}>
              <span style={{display:"flex",alignItems:"center",gap:14}}><Icon.trash s={14} c={P.red}/>{t.deleteAll}</span>
            </button>
          </div>
        )}

        {/* ── CLIENTS ── */}
        {tab==="clients"&&(
          <div style={pad} className="page-in" key="clients">
            <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6,marginBottom:18,marginTop:2,scrollbarWidth:"none"}}>
              {FILTERS.map(f=>(
                <button key={f.key} onClick={()=>setFilter(f.key)} style={pillBtn(filter===f.key)}>{f.label}</button>
              ))}
            </div>

            {filtered.length===0?(
              <div style={{textAlign:"center",padding:"70px 20px"}}>
                <div style={{...FRAUNCES,fontSize:22,color:P.text,marginBottom:8}}>{t.noClients}</div>
                <div style={{fontSize:13,color:P.textSub}}>{t.noClientsSub}</div>
              </div>
            ):filtered.map((c,i)=>(
              <ClientCard key={c.id} c={c} t={t} P={P} rtl={rtl} i={i}
                onCall={()=>markCalled(c.id,c.phone)}
                onWA={()=>window.open(`https://wa.me/${c.phone.replace(/\D/g,"")}`)}
                onSC={()=>openComment(c)}
                onDel={()=>{if(window.confirm(t.delClientConfirm))delClient(c.id);}}
                onNatChange={(nat,country)=>updateClientNat(c.id,nat,country)}
              />
            ))}
          </div>
        )}

        {/* ── SECOND CALL ── */}
        {tab==="second"&&(
          <div style={pad} className="page-in" key="second">
            <button style={{...actionRow,marginBottom:6,paddingTop:2}} onClick={()=>setModal("addSecond")}>
              <span style={{display:"flex",alignItems:"center",gap:14}}><Icon.plus s={16} c={P.accent}/>{t.addSecond}</span>
              <Icon.arrowRight s={13} c={P.textSub}/>
            </button>
            {filteredSecond.length===0?(
              <div style={{textAlign:"center",padding:"70px 20px"}}>
                <div style={{...FRAUNCES,fontSize:22,color:P.text,marginBottom:8}}>{t.noSecond}</div>
                <div style={{fontSize:13,color:P.textSub}}>{t.noSecondSub}</div>
              </div>
            ):filteredSecond.map((c,i)=>(
              <SecondCard key={c.id} c={c} t={t} P={P} rtl={rtl} i={i}
                onCall={()=>window.open(`tel:${c.phone}`)}
                onWA={()=>window.open(`https://wa.me/${c.phone.replace(/\D/g,"")}`)}
                onRemove={()=>removeFromSecond(c.id)}
              />
            ))}
          </div>
        )}

        {/* ── STATS ── */}
        {tab==="stats"&&(
          <div style={pad} className="page-in" key="stats">
            <div style={{marginTop:6}}>
              {[[t.callsToday,callsToday],[t.callsYest,callsYest],[t.callsWeek,callsWeek],[t.callsMonth,callsMonth]].map(([label,val],i)=>(
                <div key={label} className="card-in" style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"18px 0",borderBottom:`1px solid ${P.border}`,animationDelay:`${i*0.05}s`}}>
                  <div style={{fontSize:13,color:P.textSub,fontWeight:500,letterSpacing:0.2}}>{label}</div>
                  <div style={{...FRAUNCES,fontSize:32,fontWeight:500,color:P.text}}>{val}</div>
                </div>
              ))}
            </div>

            {/* weekly breakdown */}
            <div style={{margin:"30px 0 14px",fontSize:10.5,fontWeight:700,color:P.textSub,textTransform:"uppercase",letterSpacing:1.6}}>{t.weeklyBreakdown}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:8}}>
              {weeksInMonth.map((w,i)=>(
                <div key={w.idx} className="card-in" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 16px",background:P.surface,border:`1px solid ${P.border}`,borderRadius:14,animationDelay:`${i*0.04}s`}}>
                  <div style={{fontSize:13,color:P.text,fontWeight:500}}>{t.week} {w.idx}</div>
                  <div style={{...FRAUNCES,fontSize:22,fontWeight:600,color:P.accent}}>{w.total}</div>
                </div>
              ))}
            </div>

            {/* selected day detail with prev/next */}
            <div style={{margin:"30px 0 14px",fontSize:10.5,fontWeight:700,color:P.textSub,textTransform:"uppercase",letterSpacing:1.6}}>{t.dayDetail}</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:P.surface,border:`1px solid ${P.border}`,borderRadius:16,padding:"14px 16px",marginBottom:20}}>
              <button onClick={()=>shiftSelectedDay(-1)} style={{width:32,height:32,borderRadius:"50%",border:`1px solid ${P.border}`,background:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                <Icon.chevron s={14} c={P.textSub} style={{transform:rtl?"rotate(-90deg)":"rotate(90deg)"}}/>
              </button>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:11.5,color:P.textSub,marginBottom:4}}>{selectedDayLabel}</div>
                <div style={{...FRAUNCES,fontSize:30,fontWeight:600,color:P.accent}}>{callLog[selectedDay]||0}</div>
              </div>
              <button onClick={()=>shiftSelectedDay(1)} style={{width:32,height:32,borderRadius:"50%",border:`1px solid ${P.border}`,background:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                <Icon.chevron s={14} c={P.textSub} style={{transform:rtl?"rotate(90deg)":"rotate(-90deg)"}}/>
              </button>
            </div>

            {/* calendar grid */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",margin:"30px 0 14px"}}>
              <div style={{fontSize:10.5,fontWeight:700,color:P.textSub,textTransform:"uppercase",letterSpacing:1.6}}>
                {t.calendarTitle} · {MONTH_NAMES[lang][calMonth]} {calYear}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={calPrev} style={{width:28,height:28,borderRadius:"50%",border:`1px solid ${P.border}`,background:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                  <Icon.chevron s={13} c={P.textSub} style={{transform:"rotate(90deg)"}}/>
                </button>
                <button onClick={calNext} style={{width:28,height:28,borderRadius:"50%",border:`1px solid ${P.border}`,background:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                  <Icon.chevron s={13} c={P.textSub} style={{transform:"rotate(-90deg)"}}/>
                </button>
              </div>
            </div>
            <div style={{background:P.surface,border:`1px solid ${P.border}`,borderRadius:16,padding:"14px 10px",marginBottom:20}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>
                {WEEKDAY_SHORT[lang].map((d,i)=>(
                  <div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:P.textSub,padding:"2px 0"}}>{d}</div>
                ))}
              </div>
              {monthGrid.map((week,wi)=>(
                <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
                  {week.map((cell,ci)=>{
                    if(!cell)return<div key={ci}/>;
                    const count=callLog[cell.dateKey]||0;
                    const isToday=isCurrentCalMonth&&cell.dateKey===today;
                    const isSelected=cell.dateKey===selectedDay;
                    return(
                      <div key={ci} onClick={()=>setSelectedDay(cell.dateKey)} style={{
                        textAlign:"center",padding:"6px 0",borderRadius:10,cursor:"pointer",
                        background:isSelected?P.accent:(count>0?P.accentSoft:"transparent"),
                        border:isToday&&!isSelected?`1.4px solid ${P.accent}`:"1.4px solid transparent",
                        transition:"all 0.15s",
                      }}>
                        <div style={{fontSize:10.5,color:isSelected?P.bg:P.textSub,marginBottom:2}}>{cell.day}</div>
                        <div style={{...FRAUNCES,fontSize:13,fontWeight:600,color:isSelected?P.bg:(count>0?P.accent:P.border)}}>{count||"–"}</div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>

            {Object.keys(monthHistory).length>0&&<>
              <div style={{margin:"30px 0 6px",fontSize:10.5,fontWeight:700,color:P.textSub,textTransform:"uppercase",letterSpacing:1.6}}>{t.prevMonths}</div>
              {Object.entries(monthHistory).sort((a,b)=>b[0].localeCompare(a[0])).map(([m,cnt])=>(
                <div key={m} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"14px 0",borderBottom:`1px solid ${P.border}`}}>
                  <div style={{fontSize:13,color:P.textSub}}>{m}</div>
                  <div style={{...FRAUNCES,fontSize:20,color:P.text}}>{cnt}</div>
                </div>
              ))}
            </>}
          </div>
        )}
      </div>

      {/* BOTTOM NAV */}
      <div style={navWrap}>
        {[
          {key:"home",icon:Icon.home,label:t.tab_home},
          {key:"clients",icon:Icon.users,label:t.tab_clients},
          {key:"second",icon:Icon.phone,label:t.tab_second},
          {key:"stats",icon:Icon.bar,label:t.tab_stats},
        ].map(n=>{
          const active=tab===n.key;
          return(
            <button key={n.key} style={navBtn} onClick={()=>setTab(n.key)}>
              <n.icon s={19} c={active?P.text:P.textSub}/>
              <span style={{fontSize:9.5,fontWeight:active?700:500,color:active?P.text:P.textSub,letterSpacing:0.3,transition:"color 0.2s"}}>{n.label}</span>
              <div style={{position:"absolute",bottom:0,left:"50%",height:2,width:active?20:0,background:P.text,borderRadius:1,transform:"translateX(-50%)",transition:"width 0.28s cubic-bezier(.22,1,.36,1)"}}/>
            </button>
          );
        })}
      </div>

      {/* ════ MODALS ════ */}
      {modal==="settings"&&(
        <div style={modalOverlay} className="ov-in" onClick={closeModal}>
          <div style={modalSheet} className={modalClosing?"":"sheet-in"} onClick={e=>e.stopPropagation()}>
            <div style={sheetHandle}/>
            <div style={sheetPad}>
              <div style={sheetTitle}>{t.settings}</div>
              <div style={{marginBottom:22}}>
                <div style={labelStyle}>{t.lang}</div>
                <div style={{display:"flex",gap:8}}>
                  {["en","ar"].map(l=>(
                    <button key={l} onClick={()=>setLang(l)} style={{flex:1,padding:"12px",border:`1.5px solid ${lang===l?P.text:P.border}`,borderRadius:30,background:lang===l?P.text:"none",color:lang===l?P.bg:P.textSub,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Inter',sans-serif",transition:"all 0.2s"}}>{l==="en"?"English":"عربي"}</button>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:28}}>
                <div style={labelStyle}>{t.theme}</div>
                <div style={{display:"flex",gap:8}}>
                  {[["light",t.light],["dark",t.dark]].map(([v,label])=>(
                    <button key={v} onClick={()=>setTheme(v)} style={{flex:1,padding:"12px",border:`1.5px solid ${theme===v?P.text:P.border}`,borderRadius:30,background:theme===v?P.text:"none",color:theme===v?P.bg:P.textSub,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Inter',sans-serif",transition:"all 0.2s"}}>{label}</button>
                  ))}
                </div>
              </div>
              <button style={btn("primary")} onClick={closeModal}>{t.close}</button>
            </div>
          </div>
        </div>
      )}

      {modal==="addSingle"&&(
        <div style={modalOverlay} className="ov-in" onClick={closeModal}>
          <div style={modalSheet} className={modalClosing?"":"sheet-in"} onClick={e=>e.stopPropagation()}>
            <div style={sheetHandle}/>
            <div style={sheetPad}>
              <div style={sheetTitle}>{t.addClient}</div>
              <div style={labelStyle}>{t.nameLabel}</div>
              <input style={inputStyle} value={singleForm.name} onChange={e=>setSingleForm(f=>({...f,name:e.target.value}))} placeholder={t.nameLabel}/>
              <div style={labelStyle}>{t.phoneLabel}</div>
              <input style={inputStyle} value={singleForm.phone} onChange={e=>setSingleForm(f=>({...f,phone:e.target.value}))} placeholder={t.phoneLabel} type="tel"/>
              <div style={labelStyle}>{t.natLabel}</div>
              <select style={selectStyle} value={singleForm.nat} onChange={e=>setSingleForm(f=>({...f,nat:e.target.value}))}>
                <option value="eg">{t.egOpt}</option>
                <option value="intl">{t.intlOpt}</option>
              </select>
              {singleForm.nat==="intl"&&(
                <div className="expand-in">
                  <div style={labelStyle}>{t.countryLabel}</div>
                  <input style={inputStyle} value={singleForm.country} onChange={e=>setSingleForm(f=>({...f,country:e.target.value}))} placeholder={t.countryHint}/>
                </div>
              )}
              <div style={btnRow}>
                <button style={btn("secondary")} onClick={closeModal}>{t.cancel}</button>
                <button style={btn("primary")} onClick={addSingle}>{t.save}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {modal==="addMulti"&&(
        <div style={modalOverlay} className="ov-in" onClick={closeModal}>
          <div style={modalSheet} className={modalClosing?"":"sheet-in"} onClick={e=>e.stopPropagation()}>
            <div style={sheetHandle}/>
            <div style={sheetPad}>
              <div style={sheetTitle}>{t.addMultiple}</div>
              <div style={hintStyle}>{t.importHint}</div>
              {mErr&&<div style={errStyle}>{mErr}</div>}
              <div style={{display:"flex",gap:12}}>
                <div style={{flex:1}}>
                  <div style={labelStyle}>{t.pasteNames}</div>
                  <textarea style={textareaStyle} value={mNames} onChange={e=>setMNames(e.target.value)} placeholder={"Ahmed\nMohamed\nAli"}/>
                </div>
                <div style={{flex:1}}>
                  <div style={labelStyle}>{t.pastePhones}</div>
                  <textarea style={textareaStyle} value={mPhones} onChange={e=>setMPhones(e.target.value)} placeholder={"010012\n011123\n+97150…"}/>
                </div>
              </div>
              <div style={btnRow}>
                <button style={btn("secondary")} onClick={()=>{closeModal();setMErr("");}}>{t.cancel}</button>
                <button style={btn("primary")} onClick={importMulti}>{t.importBtn}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {modal==="comment"&&(
        <div style={modalOverlay} className="ov-in" onClick={closeModal}>
          <div style={modalSheet} className={modalClosing?"":"sheet-in"} onClick={e=>e.stopPropagation()}>
            <div style={sheetHandle}/>
            <div style={sheetPad}>
              <div style={sheetTitle}>{t.sc}</div>
              <div style={labelStyle}>{t.noteHint}</div>
              <textarea style={textareaStyle} value={commentData.text} onChange={e=>setCommentData(d=>({...d,text:e.target.value}))} placeholder={t.noteHint}/>
              <div style={btnRow}>
                <button style={btn("secondary")} onClick={closeModal}>{t.cancel}</button>
                <button style={btn("primary")} onClick={saveComment}>{t.save}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {modal==="addSecond"&&(
        <div style={modalOverlay} className="ov-in" onClick={closeModal}>
          <div style={modalSheet} className={modalClosing?"":"sheet-in"} onClick={e=>e.stopPropagation()}>
            <div style={sheetHandle}/>
            <div style={sheetPad}>
              <div style={sheetTitle}>{t.addSecond}</div>
              <div style={labelStyle}>{t.nameLabel}</div>
              <input style={inputStyle} value={sForm.name} onChange={e=>setSForm(f=>({...f,name:e.target.value}))} placeholder={t.nameLabel}/>
              <div style={labelStyle}>{t.phoneLabel}</div>
              <input style={inputStyle} value={sForm.phone} onChange={e=>setSForm(f=>({...f,phone:e.target.value}))} placeholder={t.phoneLabel} type="tel"/>
              <div style={labelStyle}>{t.noteHint}</div>
              <textarea style={textareaStyle} value={sForm.note} onChange={e=>setSForm(f=>({...f,note:e.target.value}))} placeholder={t.noteHint}/>
              <div style={btnRow}>
                <button style={btn("secondary")} onClick={closeModal}>{t.cancel}</button>
                <button style={btn("primary")} onClick={addManualSecond}>{t.save}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* CAMPAIGN MODAL */}
      {modal==="campaign"&&!campQueue&&(
        <div style={modalOverlay} className="ov-in" onClick={closeModal}>
          <div style={modalSheet} className={modalClosing?"":"sheet-in"} onClick={e=>e.stopPropagation()}>
            <div style={sheetHandle}/>
            <div style={sheetPad}>
              <div style={sheetTitle}>{t.campaign}</div>
              <div style={hintStyle}>{t.campaignIntro}</div>

              <div style={{marginBottom:18}}>
                <div style={labelStyle}>{t.audience}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {[["all",t.audAll],["eg",t.audEg],["intl",t.audIntl]].map(([v,label])=>(
                    <button key={v} onClick={()=>setCampAudience(v)} style={pillBtn(campAudience===v)}>{label}</button>
                  ))}
                </div>
                <div style={{fontSize:11.5,color:P.textSub,marginTop:8}}>{campAudienceList().length} {t.recipient}{campAudienceList().length!==1?"s":""}</div>
              </div>

              <div style={labelStyle}>{t.message}</div>
              <textarea style={textareaStyle} value={campMsg} onChange={e=>setCampMsg(e.target.value)} placeholder={t.messageHint}/>

              <div style={{marginBottom:18}}>
                <div style={labelStyle}>{t.imageOpt}</div>
                {campImg?(
                  <div style={{position:"relative",display:"inline-block"}}>
                    <img src={campImg} style={{width:90,height:90,objectFit:"cover",borderRadius:12,border:`1px solid ${P.border}`}}/>
                    <button onClick={()=>setCampImg(null)} style={{position:"absolute",top:-8,right:-8,width:24,height:24,borderRadius:"50%",background:P.red,border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                      <Icon.x s={12} c="#fff"/>
                    </button>
                  </div>
                ):(
                  <label style={{display:"flex",alignItems:"center",gap:8,padding:"11px 16px",border:`1.4px dashed ${P.border}`,borderRadius:12,cursor:"pointer",fontSize:13,color:P.textSub,width:"fit-content"}}>
                    <Icon.image s={15} c={P.textSub}/>{t.addImage}
                    <input type="file" accept="image/*" onChange={handleImagePick} style={{display:"none"}}/>
                  </label>
                )}
                <div style={{fontSize:11,color:P.textSub,marginTop:8,lineHeight:1.5}}>
                  ⚠️ WhatsApp web links can't attach images automatically — save this image and attach it manually in the chat if needed.
                </div>
              </div>

              <div style={{marginBottom:22}}>
                <div style={labelStyle}>{t.delay}</div>
                <div style={{display:"flex",gap:10}}>
                  <input type="number" min="1" style={{...inputStyle,marginBottom:0,width:70,textAlign:"center"}} value={campDelay} onChange={e=>setCampDelay(e.target.value)}/>
                  <div style={{display:"flex",gap:8,flex:1}}>
                    {[["seconds",t.seconds],["minutes",t.minutes]].map(([v,label])=>(
                      <button key={v} onClick={()=>setCampDelayUnit(v)} style={{...pillBtn(campDelayUnit===v),flex:1}}>{label}</button>
                    ))}
                  </div>
                </div>
              </div>

              <div style={btnRow}>
                <button style={btn("secondary")} onClick={closeModal}>{t.cancel}</button>
                <button style={btn("primary")} onClick={startCampaign} disabled={!campMsg.trim()||campAudienceList().length===0}>{t.startCampaign}</button>
              </div>
              {campAudienceList().length===0&&<div style={{...errStyle,marginTop:14}}>{t.noAudience}</div>}
            </div>
          </div>
        </div>
      )}

      {/* CAMPAIGN QUEUE RUNNER */}
      {campQueue&&(
        <div style={modalOverlay} className="ov-in">
          <div style={modalSheet} className="sheet-in">
            <div style={sheetHandle}/>
            <div style={sheetPad}>
              <div style={sheetTitle}>{t.campaignQueue}</div>
              {campQueue.idx<campQueue.list.length?(
                <>
                  <div style={{fontSize:12,color:P.textSub,marginBottom:6,textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>
                    {campQueue.idx+1} {t.campaignProgress} {campQueue.list.length}
                  </div>
                  <div style={{...FRAUNCES,fontSize:24,color:P.text,marginBottom:4}}>{campQueue.list[campQueue.idx].name}</div>
                  <div style={{fontSize:13,color:P.textSub,marginBottom:24}}>{campQueue.list[campQueue.idx].phone}</div>
                  <button style={btn("primary")} onClick={openNextChat}>
                    <Icon.wa s={15} c={P.bg}/> {t.sendNext}
                  </button>
                  <button style={{...btn("secondary"),marginTop:10}} onClick={()=>{setCampQueue(null);closeModal();}}>{t.finishCampaign}</button>
                </>
              ):(
                <>
                  <div style={{...FRAUNCES,fontSize:22,color:P.text,marginBottom:20,textAlign:"center"}}>{t.campaignDone}</div>
                  <button style={btn("primary")} onClick={()=>{setCampQueue(null);closeModal();}}>{t.close}</button>
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Client Card — editorial, always expanded, collapsible via chevron ── */
function ClientCard({c,t,P,rtl,i,onCall,onWA,onSC,onDel,onNatChange}){
  const[open,setOpen]=useState(true);
  const[editingNat,setEditingNat]=useState(false);
  return(
    <div className="card-in" style={{borderBottom:`1px solid ${P.border}`,padding:"16px 0",animationDelay:`${i*0.03}s`}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:3,height:34,borderRadius:2,flexShrink:0,background:c.called?P.green:P.border,transition:"background 0.25s"}}/>
        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>setEditingNat(false)}>
          <div style={{...FRAUNCES,fontSize:17,fontWeight:500,color:P.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
          <div style={{fontSize:12,color:P.textSub,marginTop:2,letterSpacing:0.2,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span>{c.phone}</span>
            <span>·</span>
            <span onClick={(e)=>{e.stopPropagation();setEditingNat(v=>!v);}} style={{textDecoration:"underline",textDecorationStyle:"dotted",cursor:"pointer"}}>
              {c.nat==="eg"?t.egOpt:(c.country?`${t.intlOpt} · ${c.country}`:t.intlOpt)}
            </span>
            {c.called&&(
              <span className="check-in" style={{display:"flex",alignItems:"center",gap:3,color:P.green,fontWeight:700}}>
                · <Icon.check s={11} c={P.green}/> {t.called}
              </span>
            )}
          </div>
        </div>
        <button onClick={()=>setOpen(o=>!o)} style={{background:"none",border:"none",cursor:"pointer",padding:6,flexShrink:0,transform:open?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.3s cubic-bezier(.22,1,.36,1)"}}>
          <Icon.chevron s={15} c={P.textSub}/>
        </button>
      </div>

      {editingNat&&(
        <div className="expand-in" style={{paddingTop:12,paddingInlineStart:17}}>
          <div style={{display:"flex",gap:8,marginBottom:c.nat==="intl"?10:0}}>
            <button onClick={()=>onNatChange("eg","")} style={{...pillBtn_(c.nat==="eg",P),flex:1}}>{t.egOpt}</button>
            <button onClick={()=>onNatChange("intl",c.country)} style={{...pillBtn_(c.nat==="intl",P),flex:1}}>{t.intlOpt}</button>
          </div>
          {c.nat==="intl"&&(
            <input
              style={{width:"100%",padding:"9px 12px",background:P.surface2,border:`1px solid ${P.border}`,borderRadius:10,fontSize:13,color:P.text,outline:"none",fontFamily:"'Inter',sans-serif"}}
              defaultValue={c.country} placeholder={t.countryHint}
              onBlur={e=>onNatChange("intl",e.target.value)}
            />
          )}
        </div>
      )}

      {open&&(
        <div className="expand-in" style={{paddingTop:14,paddingInlineStart:17}}>
          {c.note&&<div style={{fontSize:12.5,color:P.textSub,fontStyle:"italic",marginBottom:12,paddingInlineStart:12,borderInlineStart:`2px solid ${P.accent}`,lineHeight:1.5}}>{c.note}</div>}
          <div style={{display:"flex",gap:8}}>
            <CBtn P={P} disabled={c.called} onClick={!c.called?onCall:null} icon={<Icon.phone s={13} c={c.called?P.textSub:P.text}/>} label={t.call}/>
            <CBtn P={P} onClick={onWA} icon={<Icon.wa s={13} c={P.text}/>} label="WA"/>
            <CBtn P={P} onClick={onSC} icon={<Icon.repeat s={12} c={P.text}/>} label={t.sc}/>
            <CBtn P={P} danger onClick={onDel} icon={<Icon.trash s={12} c={P.red}/>} label=""/>
          </div>
        </div>
      )}
    </div>
  );
}
function pillBtn_(active,P){
  return{padding:"7px 14px",borderRadius:30,fontSize:11.5,fontWeight:600,border:`1.3px solid ${active?P.text:P.border}`,background:active?P.text:"none",color:active?P.bg:P.textSub,cursor:"pointer",transition:"all 0.2s",fontFamily:"'Inter',sans-serif"};
}

function SecondCard({c,t,P,rtl,i,onCall,onWA,onRemove}){
  return(
    <div className="card-in" style={{borderBottom:`1px solid ${P.border}`,padding:"16px 0",animationDelay:`${i*0.03}s`}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:c.note?10:14}}>
        <div style={{width:3,height:34,borderRadius:2,background:P.accent,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{...FRAUNCES,fontSize:17,fontWeight:500,color:P.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
          <div style={{fontSize:12,color:P.textSub,marginTop:2}}>{c.phone}</div>
        </div>
        <button onClick={onRemove} style={{background:"none",border:"none",cursor:"pointer",padding:6,flexShrink:0}}>
          <Icon.x s={15} c={P.textSub}/>
        </button>
      </div>
      {c.note&&<div style={{fontSize:12.5,color:P.textSub,fontStyle:"italic",marginBottom:12,paddingInlineStart:17,borderInlineStart:`2px solid ${P.accent}`,lineHeight:1.5,marginInlineStart:17}}>{c.note}</div>}
      <div style={{display:"flex",gap:8,paddingInlineStart:17}}>
        <CBtn P={P} onClick={onCall} icon={<Icon.phone s={13} c={P.text}/>} label={t.call}/>
        <CBtn P={P} onClick={onWA} icon={<Icon.wa s={13} c={P.text}/>} label="WA"/>
      </div>
    </div>
  );
}

function CBtn({P,onClick,icon,label,disabled,danger}){
  const[pressed,setPressed]=useState(false);
  return(
    <button
      onMouseDown={()=>onClick&&setPressed(true)} onMouseUp={()=>setPressed(false)} onMouseLeave={()=>setPressed(false)}
      onTouchStart={()=>onClick&&setPressed(true)} onTouchEnd={()=>setPressed(false)}
      onClick={onClick||undefined}
      style={{
        padding:label?"8px 14px":"8px 10px",border:`1.3px solid ${danger?P.redSoft:P.border}`,borderRadius:30,
        background:pressed?(danger?P.red:P.text):"none",
        color:disabled?P.textSub:(pressed?P.bg:P.text),
        fontSize:11.5,fontWeight:600,cursor:onClick?"pointer":"default",
        display:"flex",alignItems:"center",justifyContent:"center",gap:6,
        transition:"all 0.15s",fontFamily:"'Inter',sans-serif",opacity:disabled?0.45:1,letterSpacing:0.2,
      }}>
      {icon}{label}
    </button>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
